<!-- → src/app/modules/utilisateurs/utilisateur-list/utilisateur-list.html -->
<div @fadeInUp class="list-page">

  <div class="list-header">
    <div>
      <h1 class="page-title">Gestion des utilisateurs</h1>
      <p class="page-subtitle">Comptes, rôles et permissions du système</p>
    </div>
    <button mat-raised-button class="btn-primary" (click)="openForm()">
      <mat-icon>person_add</mat-icon> Nouveau compte
    </button>
  </div>

  <mat-progress-bar *ngIf="loading" mode="indeterminate" class="loading-bar"></mat-progress-bar>

  <div class="table-card">
    <table mat-table [dataSource]="users" class="w-full" [@staggerList]="users.length">

      <!-- Avatar -->
      <ng-container matColumnDef="avatar">
        <th mat-header-cell *matHeaderCellDef style="width:56px"></th>
        <td mat-cell *matCellDef="let u">
          <div class="avatar" [style.background]="roleConfig[u.role]?.color || '#64748B'">
            {{ getInitials(u.username) }}
          </div>
        </td>
      </ng-container>

      <!-- Username -->
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>Utilisateur</th>
        <td mat-cell *matCellDef="let u">
          <div class="cell-primary">
            {{ u.username }}
            <span class="self-badge" *ngIf="isSelf(u)">Vous</span>
          </div>
          <div class="cell-secondary">ID #{{ u.id }}</div>
        </td>
      </ng-container>

      <!-- Rôle -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rôle</th>
        <td mat-cell *matCellDef="let u">
          <span class="role-badge"
            [style.color]="roleConfig[u.role]?.color"
            [style.background]="roleConfig[u.role]?.bg">
            <mat-icon style="font-size:13px;width:13px;height:13px;line-height:13px">
              {{ roleConfig[u.role]?.icon }}
            </mat-icon>
            {{ roleConfig[u.role]?.label }}
          </span>
        </td>
      </ng-container>

      <!-- Profil médecin lié -->
      <ng-container matColumnDef="medecin">
        <th mat-header-cell *matHeaderCellDef>Profil lié</th>
        <td mat-cell *matCellDef="let u">
          <span class="medecin-link" *ngIf="u.medecinNom">
            <mat-icon style="font-size:14px;width:14px;height:14px;line-height:14px;color:#10B981">link</mat-icon>
            {{ u.medecinNom }}
          </span>
          <span class="cell-empty" *ngIf="!u.medecinNom">—</span>
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef style="width:100px"></th>
        <td mat-cell *matCellDef="let u">
          <div class="row-actions">
            <button mat-icon-button matTooltip="Modifier les droits" class="action-btn action-edit"
              (click)="openForm(u)">
              <mat-icon>manage_accounts</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Supprimer" class="action-btn action-delete"
              (click)="delete(u)"
              [disabled]="isSelf(u)"
              [matTooltip]="isSelf(u) ? 'Impossible de supprimer votre propre compte' : 'Supprimer'">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
    </table>

    <div *ngIf="!loading && users.length === 0" class="empty-state">
      <mat-icon>group</mat-icon>
      <p>Aucun utilisateur trouvé</p>
    </div>
  </div>

</div>
