<div class="toast-root" [class]="'toast-' + data.type" @slideInRight>
  <div class="toast-icon-wrap">
    <mat-icon class="toast-icon">{{ icons[data.type] }}</mat-icon>
  </div>
  <div class="toast-body">
    <p class="toast-title" *ngIf="data.title">{{ data.title }}</p>
    <p class="toast-message">{{ data.message }}</p>
  </div>
  <button class="toast-close" (click)="snackRef.dismiss()">
    <mat-icon>close</mat-icon>
  </button>
  <div class="toast-progress" [class]="'toast-progress-' + data.type"></div>
</div>
